name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: test
      SESSION_COOKIE_NAME: trustloop-session
      SESSION_TTL_HOURS: "24"
      SESSION_SECRET: ci-test-secret-minimum-16
      API_KEY_PEPPER: ci-test-pepper-minimum-16
      SLACK_SIGNING_SECRET: ci-test-slack-signing-secret
      TEMPORAL_ADDRESS: localhost:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: support-general
      CODEX_TASK_QUEUE: codex-intensive
      INTERNAL_SERVICE_KEY: tli_ci_test_service_key_12345
      COREPACK_ENABLE_STRICT: "0"
      COREPACK_ENABLE_AUTO_PIN: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Enable turbo remote cache (GitHub Actions cache backend)
        uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Determine turbo filter base
        id: turbo-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD^1" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove yarn to prevent Corepack/SWC registry conflict
        run: |
          corepack disable || true
          npm rm -g yarn 2>/dev/null || true
          rm -f "$(which yarn 2>/dev/null)" "$(which yarnpkg 2>/dev/null)" 2>/dev/null || true

      - run: npm install
      - name: Install platform-specific native binaries for Linux CI
        run: |
          npm install --no-save \
            @tailwindcss/oxide-linux-x64-gnu \
            @next/swc-linux-x64-gnu \
            @node-rs/argon2-linux-x64-gnu \
            @img/sharp-linux-x64 \
            lightningcss-linux-x64-gnu \
            || true

      # Global guards — always run, cheap, protect committed artifacts.
      - run: npm run db:generate
      - run: git diff --exit-code
      - run: npm run openapi:check

      # Scoped validation — only workspaces changed since base ref + their dependents.
      # `[ref]` matches changed packages; trailing `...` pulls in everything that depends on them.
      - name: Validate affected workspaces
        run: npx turbo run type-check lint test build --filter="[${{ steps.turbo-base.outputs.ref }}]..."
        env:
          SKIP_ENV_VALIDATION: "1"

  # Docker build verification — only builds the services whose inputs changed.
  # Mirrors the watchPatterns in deploy/railway.*.json so CI matches Railway's
  # rebuild triggers. Uses GHA layer cache scoped per service; a typical PR
  # rebuilds 1-2 services from cache in ~30-60s each, not minutes.
  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Detect which services changed
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            marketing:
              - 'apps/marketing/**'
              - 'packages/brand/**'
              - 'deploy/marketing.Dockerfile'
              - 'deploy/railway.marketing.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            web:
              - 'apps/web/**'
              - 'packages/brand/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/rest/**'
              - 'packages/types/**'
              - 'deploy/web.Dockerfile'
              - 'deploy/railway.web.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            queue:
              - 'apps/queue/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/rest/**'
              - 'packages/types/**'
              - 'deploy/queue.Dockerfile'
              - 'deploy/railway.queue.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            agents:
              - 'apps/agents/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/types/**'
              - 'deploy/agents.Dockerfile'
              - 'deploy/railway.agents.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'

      - name: Set up Docker Buildx
        if: |
          steps.changes.outputs.marketing == 'true' ||
          steps.changes.outputs.web == 'true' ||
          steps.changes.outputs.queue == 'true' ||
          steps.changes.outputs.agents == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build marketing image
        if: steps.changes.outputs.marketing == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/marketing.Dockerfile
          push: false
          cache-from: type=gha,scope=marketing
          cache-to: type=gha,mode=max,scope=marketing
          tags: trustloop-marketing:ci

      - name: Build web image
        if: steps.changes.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web.Dockerfile
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: trustloop-web:ci

      - name: Build queue image
        if: steps.changes.outputs.queue == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/queue.Dockerfile
          push: false
          cache-from: type=gha,scope=queue
          cache-to: type=gha,mode=max,scope=queue
          tags: trustloop-queue:ci

      - name: Build agents image
        if: steps.changes.outputs.agents == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/agents.Dockerfile
          push: false
          cache-from: type=gha,scope=agents
          cache-to: type=gha,mode=max,scope=agents
          tags: trustloop-agents:ci

      - name: Summary
        if: always()
        run: |
          echo "### Docker build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Changed | Built |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| marketing | ${{ steps.changes.outputs.marketing }} | ${{ steps.changes.outputs.marketing == 'true' && '✅' || '⏭️ skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| web       | ${{ steps.changes.outputs.web }}       | ${{ steps.changes.outputs.web == 'true' && '✅' || '⏭️ skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| queue     | ${{ steps.changes.outputs.queue }}     | ${{ steps.changes.outputs.queue == 'true' && '✅' || '⏭️ skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agents    | ${{ steps.changes.outputs.agents }}    | ${{ steps.changes.outputs.agents == 'true' && '✅' || '⏭️ skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
