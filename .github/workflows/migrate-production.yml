name: Migrate production DB

# Runs prisma migrate deploy against the production database when:
#   - migration files or schema change on the production branch (auto-trigger)
#   - a human triggers the workflow manually (emergency/rollback path)
#
# Branch model:
#   main        →  staging env  (migrate-staging.yml)
#   production  →  prod env     (this workflow)
#
# Promotion flow:
#   1. PR merges to main → migrate-staging runs → Railway deploys staging
#   2. Once staging is verified, open a PR from main → production
#   3. Merge that PR → this workflow runs → Railway deploys production
#
# Prereq: PRODUCTION_DATABASE_URL secret must be set in repo settings.
# The URL should be the Railway prod Postgres TCP Proxy (public) URL.
#
# Recommended extra gate: configure a GitHub Environment called "production"
# in repo Settings → Environments with required reviewers. This workflow
# already declares `environment: production` below, so GitHub will block
# execution until an approver clicks through. Harmless if the env isn't
# configured yet (runs without a gate).

on:
  push:
    branches: [production]
    paths:
      - 'packages/database/prisma/migrations/**'
      - 'packages/database/prisma/schema.prisma'
      - 'packages/database/prisma/schema/**'
      - '.github/workflows/migrate-production.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you manually running this?'
        required: true
        default: 'Apply pending production migrations'

concurrency:
  # Only one production migration runs at a time. Never cancel in-flight.
  group: migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production  # triggers approval gate if the env has reviewers set
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify secret is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::PRODUCTION_DATABASE_URL secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          # print the host only, never the password
          host=$(echo "$DATABASE_URL" | sed -E 's|^postgresql://[^@]+@([^:/]+).*|\1|')
          echo "Target host: $host"

      - name: Install deps (minimal — just the database workspace)
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Show pending migrations
        run: |
          npx --workspace @shared/database prisma migrate status || true
        # non-fatal: `migrate status` exits non-zero when drift detected.
        # We log it for visibility, then let `migrate deploy` decide.

      - name: Apply migrations
        run: npm run db:migrate

      - name: Summary
        if: always()
        run: |
          {
            echo "### Production migration"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Commit:  ${{ github.sha }}"
            echo "- Outcome: ${{ job.status }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Reason:  ${{ inputs.reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
